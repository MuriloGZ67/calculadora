<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Calculadora Web + C</title>
    <style>
        body { background-color: #121214; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { background-color: #202024; padding: 25px; border-radius: 8px; border: 1px solid #323238; text-align: center; }
        input, select, button { padding: 12px; margin: 8px 0; width: 100%; border-radius: 6px; border: 1px solid #323238; font-size: 16px; background: #121214; color: #fff; box-sizing: border-box; }
        button { background-color: #04d361; color: #000; font-weight: bold; border: none; cursor: pointer; }
        button:hover { background-color: #06b956; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Calculadora com Motor em C</h2>
        <select id="op" onchange="mudarCampos()">
            <option value="1">Soma</option>
            <option value="5">Raiz Quadrada</option>
            <option value="6">Ao Quadrado</option>
            <option value="7">Bháskara</option>
        </select>
        
        <input type="number" id="v1" placeholder="Número A">
        <input type="number" id="v2" placeholder="Número B">
        <input type="number" id="v3" placeholder="Número C" style="display:none;">
        
        <button onclick="dispararC()">Calcular no C</button>
        <p id="res">Resultado aparecerá aqui.</p>
    </div>

    <script src="calculadora.js"></script>
    <script>
        function mudarCampos() {
            const op = document.getElementById("op").value;
            document.getElementById("v2").style.display = (op === "5" || op === "6") ? "none" : "block";
            document.getElementById("v3").style.display = (op === "7") ? "block" : "none";
        }

        Module.onRuntimeInitialized = function() {
            window.dispararC = function() {
                const op = parseInt(document.getElementById("op").value);
                const a = parseFloat(document.getElementById("v1").value);
                const b = parseFloat(document.getElementById("v2").value) || 0;
                const c = parseFloat(document.getElementById("v3").value) || 0;
                const painel = document.getElementById("res");

                if (op === 1) {
                    painel.innerText = "Soma no C: " + Module._calcularSoma(a, b);
                } else if (op === 5) {
                    let r = Module._calcularRaiz(a);
                    painel.innerText = r === -1 ? "Erro: Raiz negativa" : "Raiz no C: " + r;
                } else if (op === 6) {
                    painel.innerText = "Quadrado no C: " + Module._calcularQuadrado(a);
                } else if (op === 7) {
                    if (a === 0) { painel.innerText = "A não pode ser 0"; return; }
                    let d = Module._calcularDelta(a, b, c);
                    if (d < 0) { painel.innerText = `Delta: ${d} (Sem raízes reais)`; }
                    else {
                        let x1 = Module._calcularX1(a, b, d);
                        let x2 = Module._calcularX2(a, b, d);
                        painel.innerText = `Delta: ${d}\nX1 = ${x1}\nX2 = ${x2}`;
                    }
                }
            };
        };
    </script>
</body>
</html>
